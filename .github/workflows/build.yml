name: Build CloudStream Plugin

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Plugin
        run: ./gradlew MlsbdProvider:make

      - name: Push to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: MlsbdProvider/build/outputs/aar
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate plugins.json
        run: ./gradlew makePluginsJson

      - name: Push plugins.json
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: .
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}
