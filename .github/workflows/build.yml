name: Build CloudStream Plugin

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and Generate
        run: |
          ./gradlew MlsbdProvider:make
          ./gradlew makePluginsJson
          cp MlsbdProvider/build/MlsbdProvider.cs3 build/
          echo '{
            "name": "MLSBD Provider",
            "description": "MLSBD - The Largest Movie Link Store of Bangladesh",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/senkuboy0-cyber/MlsbdProvider/builds/plugins.json"
            ]
          }' > build/repo.json

      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: build
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}
